<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de usuario - HelpDesk</title>

    <!-- Dependencias locales -->
    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="public/sweetalert2/sweetalert2.min.css">

    <!-- Usamos CDN para FontAwesome porque requiere la carpeta "webfonts" que puede ser pesada de bajar por comandos, luego la descargamos en zip si el tutorial lo pide -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="public/css/style.css">
</head>

<body>

    <div class="login-card">
        <!-- Sube aquí tu logo real, asegúrate de que el archivo exista en public/img/logo.png -->
        <img src="public/img/logo.png" alt="Logo Help-Desk">

        <h3>Help-Desk</h3>

        <form action="#" method="POST" id="frmLogin">
            <input type="text" class="form-control" name="usuario" placeholder="1" required>
            <input type="password" class="form-control" name="password" placeholder="2" required>
            <button type="submit" class="btn btn-login">ENTRAR</button>
        </form>

        <a href="#" class="contact-link" data-toggle="modal" data-target="#contactoModal">Contactar con el
            administrador</a>
    </div>

    <!-- Modal de Contacto -->
    <div class="modal fade" id="contactoModal" tabindex="-1" role="dialog" aria-labelledby="contactoModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="contactoModalLabel">Contacto</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <!-- El body del modal según la captura dice exactamente: "Si no tienes una credencial llama al: 5583966633" -->
                <div class="modal-body text-left">
                    Si no tienes una credencial llama al: <strong>5583966633</strong>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencias JS Locales -->
    <script src="public/jquery/jquery.min.js"></script>
    <script src="public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="public/sweetalert2/sweetalert2.min.js"></script>
    <script src="public/js/usuarios/login.js"></script>
</body>

</html>
